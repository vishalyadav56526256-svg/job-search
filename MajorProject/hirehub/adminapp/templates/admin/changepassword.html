{% extends "admin/adminbase.html" %}
{% load static %}

{% block admin %}
<style>
  @keyframes hhFieldIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes hhShieldPop{0%{transform:scale(.6) rotate(-15deg);opacity:0}70%{transform:scale(1.1) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}

  .cp-wrap{max-width:520px;margin:0 auto;padding:2rem 0}

  .cp-header{background:linear-gradient(135deg,color-mix(in srgb,var(--hh-primary) 10%,var(--hh-card-bg)) 0%,var(--hh-card-bg) 65%);border:1px solid var(--hh-card-border);border-radius:1.1rem;padding:1.25rem 1.5rem;margin-bottom:1.25rem;text-align:center;position:relative;overflow:hidden}
  .cp-header::before{content:'';position:absolute;width:130px;height:130px;border-radius:50%;background:color-mix(in srgb,var(--hh-primary) 7%,transparent);top:-40px;right:-40px;pointer-events:none}
  .cp-shield{width:56px;height:56px;border-radius:1rem;background:color-mix(in srgb,var(--hh-primary) 12%,var(--hh-bg));display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--hh-primary);margin:0 auto .75rem;animation:hhShieldPop .6s cubic-bezier(.34,1.56,.64,1) .3s both}
  .cp-header h4{color:var(--hh-ink);font-weight:700;margin:0 0 .2rem}
  .cp-header p{color:var(--hh-muted);margin:0;font-size:.88rem}

  .cp-card{background:var(--hh-card-bg);border:1px solid var(--hh-card-border);border-radius:1.25rem;padding:1.75rem;box-shadow:0 10px 28px rgba(0,0,0,.07);transition:background .4s}

  .cp-field{animation:hhFieldIn .45s ease both}
  .cp-field:nth-child(1){animation-delay:.35s}.cp-field:nth-child(2){animation-delay:.45s}.cp-field:nth-child(3){animation-delay:.55s}

  .pwd-wrap{position:relative}
  .pwd-toggle{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--hh-muted);cursor:pointer;font-size:.9rem;padding:0;transition:color .2s}
  .pwd-toggle:hover{color:var(--hh-primary)}

  .cp-submit{width:100%;padding:.75rem;border:none!important;border-radius:999px!important;background:var(--hh-primary)!important;color:#fff!important;font-weight:700;font-size:1rem;cursor:pointer;transition:background .3s,transform .2s,box-shadow .2s!important;animation:hhFieldIn .45s ease .65s both}
  .cp-submit:hover{background:var(--hh-primary-dark)!important;transform:translateY(-2px);box-shadow:0 8px 22px color-mix(in srgb,var(--hh-primary) 30%,transparent)!important}
  .cp-submit:active{transform:scale(.97)}

  .strength-bar-wrap{height:4px;border-radius:2px;background:var(--hh-card-border);margin-top:.4rem;overflow:hidden}
  .strength-bar{height:100%;width:0;border-radius:2px;transition:width .4s,background .4s}
</style>

<div class="cp-wrap hh-reveal">
  <div class="cp-header">
    <div class="cp-shield"><i class="ti ti-lock"></i></div>
    <h4>Change Password</h4>
    <p>Update your account password securely.</p>
  </div>

  <div class="cp-card">
    <form method="post">
      {% csrf_token %}

      <div class="mb-3 cp-field">
        <label for="oldpwd" class="form-label">Current Password</label>
        <div class="pwd-wrap">
          <input type="password" class="form-control" id="oldpwd" name="oldpwd" placeholder="Enter current password" required style="padding-right:2.8rem!important;">
          <button type="button" class="pwd-toggle" onclick="togglePwd('oldpwd',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <div class="mb-3 cp-field">
        <label for="newpwd" class="form-label">New Password</label>
        <div class="pwd-wrap">
          <input type="password" class="form-control" id="newpwd" name="newpwd" placeholder="Create new password" required style="padding-right:2.8rem!important;" oninput="checkStrength(this.value)">
          <button type="button" class="pwd-toggle" onclick="togglePwd('newpwd',this)"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength-bar-wrap mt-2"><div class="strength-bar" id="strengthBar"></div></div>
        <small id="strengthLabel" style="font-size:.75rem;color:var(--hh-muted);"></small>
      </div>

      <div class="mb-4 cp-field">
        <label for="confirmpwd" class="form-label">Confirm New Password</label>
        <div class="pwd-wrap">
          <input type="password" class="form-control" id="confirmpwd" name="confirmpwd" placeholder="Repeat new password" required style="padding-right:2.8rem!important;">
          <button type="button" class="pwd-toggle" onclick="togglePwd('confirmpwd',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <button type="submit" class="cp-submit"><i class="ti ti-device-floppy me-2"></i>Update Password</button>
    </form>
  </div>
</div>

<script>
function togglePwd(id,btn){var inp=document.getElementById(id);var icon=btn.querySelector('i');inp.type=inp.type==='password'?'text':'password';icon.className=inp.type==='password'?'fas fa-eye':'fas fa-eye-slash';}
function checkStrength(val){var bar=document.getElementById('strengthBar');var lbl=document.getElementById('strengthLabel');var s=0;if(val.length>=8)s++;if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;var L=[{w:'0%',bg:'transparent',txt:''},{w:'25%',bg:'#ef4444',txt:'Weak'},{w:'50%',bg:'#f97316',txt:'Fair'},{w:'75%',bg:'#eab308',txt:'Good'},{w:'100%',bg:'#22c55e',txt:'Strong'}];var l=val.length===0?L[0]:L[s]||L[1];bar.style.width=l.w;bar.style.background=l.bg;lbl.textContent=l.txt;lbl.style.color=l.bg;}
</script>
{% endblock %}
